<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revolution Dashboard</title>
<style>
/* ─── Reset ─── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070711;--surface:#0f0f1a;--card:#14141f;--border:rgba(255,255,255,0.07);
  --accent:#7c3aed;--accent2:#6d28d9;--cyan:#00d4ff;
  --txt1:#e2e8f0;--txt2:#94a3b8;--txt3:#4b5563;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}

html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;background:var(--bg);color:var(--txt1);display:flex;flex-direction:column}

/* ─── Header ─── */
#header{
  display:flex;align-items:center;gap:12px;
  padding:0 18px;height:46px;flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
}
#header h1{font-size:15px;font-weight:700;color:var(--txt1);letter-spacing:.5px}
#header h1 span{color:var(--accent)}
#hb-dot{width:8px;height:8px;border-radius:50%;background:var(--txt3);flex-shrink:0;transition:background .3s}
#hb-dot.ok{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.6);animation:pulse-dot 2s infinite}
#hb-dot.warn{background:var(--amber)}
#hb-dot.err{background:var(--red)}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 4px rgba(34,197,94,.4)}50%{box-shadow:0 0 10px rgba(34,197,94,.9)}}
#rec-badge{
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;background:var(--txt3);color:var(--bg);transition:all .3s;
}
#rec-badge.recording{background:var(--green);color:#000;animation:pulse-rec 1.5s infinite}
#rec-badge.lowdisk{background:var(--amber);color:#000}
#rec-badge.error{background:var(--red);color:#fff}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:.7}}
#wd-badge{font-size:11px;color:var(--txt2);padding:2px 8px;border-radius:12px;border:1px solid var(--border);background:var(--card)}
#hb-text{font-size:11px;color:var(--txt3)}
#clock-now{font-size:13px;font-weight:700;color:var(--cyan);font-variant-numeric:tabular-nums;margin-left:auto;letter-spacing:.5px}

/* ─── Video wall-clock overlay ─── */
#vid-clock{
  position:absolute;bottom:8px;right:10px;
  font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;
  color:#fff;background:rgba(0,0,0,.65);padding:2px 8px;border-radius:4px;
  pointer-events:none;display:none;letter-spacing:.3px;
}


/* ─── 3-pane ─── */
#main{display:flex;flex:1;overflow:hidden}

/* ─── Sidebar ─── */
#left{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#left-title{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);padding:12px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
#date-list{flex:1;overflow-y:auto;padding:6px}
#date-list::-webkit-scrollbar{width:3px}
#date-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.date-item{padding:8px 10px;font-size:12px;cursor:pointer;border-radius:6px;color:var(--txt2);margin-bottom:2px;transition:all .15s;border:1px solid transparent}
.date-item:hover{background:var(--card);color:var(--txt1);border-color:var(--border)}
.date-item.active{background:rgba(124,58,237,.15);color:var(--accent);border-color:rgba(124,58,237,.35);font-weight:600}

/* ─── Center ─── */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#video-wrap{flex-shrink:0;background:#000;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border)}
#vid{max-width:100%;max-height:100%;display:block}
#video-placeholder{color:var(--txt3);font-size:13px;text-align:center;padding:40px 20px}
#video-placeholder::before{content:'▶';display:block;font-size:36px;margin-bottom:10px;opacity:.3}
#seg-area{flex:1;overflow-y:auto;background:var(--bg)}
#seg-area::-webkit-scrollbar{width:3px}
#seg-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#seg-title{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);padding:10px 14px 6px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
#seg-list{padding:8px}
.seg-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all .15s}
.seg-item:hover{background:var(--card);border-color:var(--border)}
.seg-item.active{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.4)}
.seg-icon{font-size:16px;flex-shrink:0;opacity:.7}
.seg-time{font-size:13px;font-weight:600;color:var(--txt1);font-variant-numeric:tabular-nums}
.seg-name{font-size:10px;color:var(--txt3);flex:1}
.seg-size{font-size:10px;color:var(--txt3);background:var(--surface);padding:2px 6px;border-radius:10px;border:1px solid var(--border);flex-shrink:0}

/* ─── Right keylog ─── */
#right{width:300px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#klog-header{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#klog-title{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3)}
#klog-file-sel{flex:1;min-width:0;font-size:10px;background:var(--card);border:1px solid var(--border);color:var(--txt1);padding:3px 6px;border-radius:5px;cursor:pointer;outline:none}
#klog-file-sel:focus{border-color:var(--accent)}
#klog-sync-toggle{font-size:10px;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--txt2);padding:3px 8px;border-radius:5px;cursor:pointer;flex-shrink:0;transition:all .15s}
#klog-sync-toggle.on{background:rgba(124,58,237,.2);color:var(--accent);border-color:rgba(124,58,237,.4)}

/* klog-body is the scroll container; head-row is its first child (sticky) */
#klog-body{flex:1;overflow-y:auto;font-size:11px;position:relative}
#klog-body::-webkit-scrollbar{width:3px}
#klog-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#klog-head-row{
  display:grid;grid-template-columns:60px 90px 1fr;
  gap:4px;padding:5px 10px;
  background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:5;
}
#klog-head-row span{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3)}
.klog-row{display:grid;grid-template-columns:60px 90px 1fr;gap:4px;padding:4px 10px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;transition:background .1s}
.klog-row:hover{background:var(--card)}
.klog-row.highlight{background:rgba(124,58,237,.1);border-left:2px solid var(--accent);padding-left:8px}
.klog-ts{color:var(--txt3);font-size:10px;font-variant-numeric:tabular-nums}
.klog-key{display:inline-block;font-size:10px;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--amber);padding:1px 5px;border-radius:4px;border-bottom-width:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.klog-win{color:var(--txt3);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.klog-empty{color:var(--txt3);font-size:12px;padding:24px;text-align:center}

/* ─── External player overlay ─── */
#ext-bar{display:none;position:absolute;inset:0;z-index:10;
  align-items:center;justify-content:center;flex-direction:column;gap:10px;
  background:rgba(7,7,17,.88);pointer-events:none}
#ext-bar.show{display:flex;pointer-events:auto}
#ext-bar p{color:var(--txt3);font-size:12px;text-align:center;line-height:1.6}
#ext-play-btn{font-size:13px;font-weight:700;padding:10px 24px;border-radius:8px;
  border:none;background:var(--accent);color:#fff;cursor:pointer;transition:background .15s}
#ext-play-btn:hover{background:var(--accent2)}

/* ─── Segment open button ─── */
.seg-ext-btn{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;
  border:1px solid var(--border);background:var(--surface);color:var(--txt3);
  cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .15s}
.seg-ext-btn:hover{background:rgba(124,58,237,.2);color:var(--accent);border-color:rgba(124,58,237,.4)}

/* ─── Error bar ─── */
#err-bar{display:none;position:fixed;bottom:12px;right:12px;z-index:200;background:rgba(239,68,68,.12);border:1px solid var(--red);color:var(--red);font-size:11px;padding:6px 12px;border-radius:6px}
.empty-hint{color:var(--txt3);font-size:12px;padding:16px;text-align:center}
</style>
</head>
<body>
<div id="header">
  <h1>&#9889; <span>Revolution</span></h1>
  <div id="hb-dot"></div>
  <span id="rec-badge">NO DATA</span>
  <span id="wd-badge">watchdog: —</span>
  <span id="hb-text"></span>
  <span id="clock-now">--:--:--</span>
</div>
<div id="main">
  <div id="left">
    <div id="left-title">Sessions</div>
    <div id="date-list"><div class="empty-hint">Loading…</div></div>
  </div>
  <div id="center">
    <div id="video-wrap" style="height:56%;position:relative">
      <div id="video-placeholder">Select a segment to play</div>
      <video id="vid" controls style="display:none;width:100%;height:100%"></video>
      <div id="vid-clock"></div>
      <div id="ext-bar">
        <p>Chrome の GPU デコーダーが応答しません。<br>外部プレイヤーで再生してください。</p>
        <button id="ext-play-btn" onclick="openExtPlayer()">▶ 外部プレイヤーで開く</button>
      </div>
    </div>
    <div id="seg-area">
      <div id="seg-title">Segments</div>
      <div id="seg-list"><div class="empty-hint">Select a date</div></div>
    </div>
  </div>
  <div id="right">
    <div id="klog-header">
      <span id="klog-title">Keylog</span>
      <select id="klog-file-sel"><option value="">— no files —</option></select>
      <button id="klog-sync-toggle" class="on">Sync</button>
    </div>
    <!-- klog-body is the scroll container; klog-head-row is sticky inside it -->
    <div id="klog-body">
      <div id="klog-head-row">
        <span>Time</span><span>Key</span><span>Window</span>
      </div>
      <div class="klog-empty">No keylog loaded</div>
    </div>
  </div>
</div>
<div id="err-bar"></div>

<script>
const API = '';
let currentDate = null;
let currentSegFile = null; // { date, filename, epochMs }
let klogData = [];
let klogSync = true;
let syncTimer = null;

function showErr(msg) {
  const b = document.getElementById('err-bar');
  b.textContent = msg; b.style.display = 'block';
  clearTimeout(b._t); b._t = setTimeout(() => { b.style.display = 'none'; }, 5000);
}

// ── Status header ──
async function refreshStatus() {
  try {
    const d = await fetch(API + '/api/status').then(r => r.json());
    const hb = d.heartbeat || {}, wd = d.watchdog || {};
    const dot = document.getElementById('hb-dot');
    const badge = document.getElementById('rec-badge');
    if (hb.ts) {
      const ageSec = Math.round((Date.now() - new Date(hb.ts).getTime()) / 1000);
      dot.className = ageSec < 60 ? 'ok' : ageSec < 300 ? 'warn' : 'err';
      document.getElementById('hb-text').textContent = ageSec + 's ago · pid ' + (hb.pid || '—');
      const st = (hb.status || 'unknown').toLowerCase();
      badge.textContent = st === 'recording' ? '● REC' : st.toUpperCase();
      badge.className = st;
    } else {
      dot.className = 'err'; badge.textContent = 'NO DATA'; badge.className = '';
    }
    document.getElementById('wd-badge').textContent = 'watchdog: ' + (wd.state || '—').toUpperCase();
  } catch(e) { document.getElementById('hb-dot').className = 'err'; }
}

// ── Sessions ──
async function loadSessions() {
  try {
    const dates = await fetch(API + '/api/sessions').then(r => r.json());
    const list = document.getElementById('date-list');
    if (!dates || !dates.length) { list.innerHTML = '<div class="empty-hint">No sessions found</div>'; return; }
    list.innerHTML = '';
    dates.forEach(d => {
      const el = document.createElement('div');
      el.className = 'date-item'; el.textContent = d; el.dataset.date = d;
      el.addEventListener('click', () => selectDate(d));
      list.appendChild(el);
    });
    selectDate(dates[0]);
  } catch(e) {
    document.getElementById('date-list').innerHTML = '<div class="empty-hint" style="color:var(--red)">Load error</div>';
    showErr('Sessions: ' + e.message);
  }
}

function selectDate(date) {
  currentDate = date;
  document.querySelectorAll('.date-item').forEach(el => el.classList.toggle('active', el.dataset.date === date));
  loadSession(date);
}

// ── Session files ──
let currentSessionMp4s = [];

async function loadSession(date) {
  document.getElementById('seg-list').innerHTML = '<div class="empty-hint">Loading…</div>';
  document.getElementById('klog-file-sel').innerHTML = '<option value="">— loading —</option>';
  try {
    const d = await fetch(API + '/api/session/' + date).then(r => r.json());
    currentSessionMp4s = d.mp4s || [];
    renderSegments(date, currentSessionMp4s);
    renderKlogSelect(date, d.klogs || []);
  } catch(e) {
    document.getElementById('seg-list').innerHTML = '<div class="empty-hint" style="color:var(--red)">Error</div>';
    showErr('Session: ' + e.message);
  }
}

function renderSegments(date, mp4s) {
  const list = document.getElementById('seg-list');
  if (!mp4s.length) { list.innerHTML = '<div class="empty-hint">No segments yet</div>'; return; }
  list.innerHTML = '';
  mp4s.forEach(f => {
    const el = document.createElement('div');
    el.className = 'seg-item'; el.dataset.file = f.name;
    const timeStr = extractTimeRange(f.name, 1800);
    const sizeMb = f.sizeBytes > 1024 ? (f.sizeBytes / 1048576).toFixed(1) + ' MB' : 'live';
    el.innerHTML =
      '<span class="seg-icon">&#127909;</span>' +
      '<span class="seg-time">' + timeStr + '</span>' +
      '<span class="seg-name">' + escHtml(f.name) + '</span>' +
      '<span class="seg-size">' + sizeMb + '</span>' +
      '<button class="seg-ext-btn" title="外部プレイヤーで開く">▶ Open</button>';
    el.querySelector('.seg-ext-btn').addEventListener('click', function(e) {
      e.stopPropagation();
      openExtPlayer(date, f.name);
    });
    el.addEventListener('click', () => playSegment(date, f, el));
    list.appendChild(el);
  });
}

function extractTime(name) {
  const m = name.match(/_(\d{2})(\d{2})(\d{2})\.mp4$/i);
  return m ? m[1] + ':' + m[2] + ':' + m[3] : name.replace(/\.mp4$/i, '');
}
// R-CLOCK-3: HH:MM〜HH:MM range display
function extractTimeRange(name, segSec) {
  const m = name.match(/_(\d{2})(\d{2})(\d{2})\.mp4$/i);
  if (!m) return extractTime(name);
  const s0 = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]);
  const s1 = s0 + (segSec || 1800);
  const pad = n => String(n).padStart(2,'0');
  const fmt = s => pad(Math.floor(s/3600)%24) + ':' + pad(Math.floor(s/60)%60);
  return fmt(s0) + '〜' + fmt(s1);
}

function playSegment(date, fileInfo, el) {
  currentSegFile = { date, filename: fileInfo.name, epochMs: fileInfo.epochMs || null };
  document.querySelectorAll('.seg-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  const vid = document.getElementById('vid');
  const ph  = document.getElementById('video-placeholder');
  const ext = document.getElementById('ext-bar');
  ext.classList.remove('show');
  vid.style.display = 'block'; ph.style.display = 'none';
  vid.src = API + '/video/' + date + '/' + fileInfo.name;
  vid.load();

  // Detect Chrome GPU decoder failure: if no metadata after 6s, show external player
  let metaReceived = false;
  const onMeta = () => { metaReceived = true; };
  vid.addEventListener('loadedmetadata', onMeta, { once: true });
  vid.addEventListener('error', () => {
    ext.classList.add('show');
  }, { once: true });
  setTimeout(() => {
    vid.removeEventListener('loadedmetadata', onMeta);
    if (!metaReceived) ext.classList.add('show');
  }, 6000);

  // R-CLOCK-2: show wall-clock time of the current video frame
  const vidClock = document.getElementById('vid-clock');
  if (vid._clockListener) vid.removeEventListener('timeupdate', vid._clockListener);
  vid._clockListener = function() {
    let epoch = currentSegFile && currentSegFile.epochMs;
    if (!epoch) {
      const cm = currentSegFile && currentSegFile.filename.match(/_(\d{2})(\d{2})(\d{2})\.mp4$/i);
      if (cm) epoch = new Date(currentSegFile.date + 'T' + cm[1] + ':' + cm[2] + ':' + cm[3] + '+09:00').getTime();
    }
    if (!epoch) { vidClock.style.display = 'none'; return; }
    const d = new Date(epoch + vid.currentTime * 1000);
    vidClock.textContent = d.toLocaleDateString('ja-JP',{month:'2-digit',day:'2-digit'}) + ' ' + d.toLocaleTimeString('ja-JP');
    vidClock.style.display = 'block';
  };
  vid.addEventListener('timeupdate', vid._clockListener);
  vidClock.style.display = 'none';

  vid.play().catch(() => {});
}

// Current active segment for the ext-bar button
function openExtPlayer(date, filename) {
  const d = date || (currentSegFile && currentSegFile.date);
  const f = filename || (currentSegFile && currentSegFile.filename);
  if (!d || !f) return;
  fetch(API + '/api/open-video/' + d + '/' + f)
    .then(r => r.json())
    .then(j => { if (!j.opened) showErr('Failed to open player'); })
    .catch(e => showErr('Open: ' + e.message));
}

// ── Keylog ──
function renderKlogSelect(date, klogs) {
  const sel = document.getElementById('klog-file-sel');
  sel.innerHTML = '';
  if (!klogs.length) {
    sel.innerHTML = '<option value="">— none —</option>';
    setKlogContent('<div class="klog-empty">No keylog</div>');
    return;
  }
  klogs.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.name; opt.textContent = f.name.replace(/\.jsonl?$/i, '');
    sel.appendChild(opt);
  });
  loadKlog(date, klogs[klogs.length - 1].name);
}

document.getElementById('klog-file-sel').addEventListener('change', function() {
  if (currentDate && this.value) loadKlog(currentDate, this.value);
});

async function loadKlog(date, filename) {
  try {
    klogData = await fetch(API + '/api/keylog/' + date + '/' + filename).then(r => r.json());
    renderKlog(klogData);
  } catch(e) {
    setKlogContent('<div class="klog-empty">Load error: ' + escHtml(e.message) + '</div>');
    showErr('Keylog: ' + e.message);
  }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatTs(ts) {
  if (typeof ts === 'string') return ts.slice(11, 19); // ISO "2026-06-28T19:48:56..." -> "19:48:56"
  const d = ts > 9999999999 ? new Date(ts) : new Date(ts * 1000);
  return d.toTimeString().slice(0, 8);
}

// Replace only the .klog-row elements and empty message, keeping #klog-head-row in place
function setKlogContent(html) {
  const body = document.getElementById('klog-body');
  // Remove rows and empty messages (but keep #klog-head-row)
  Array.from(body.children).forEach(el => {
    if (el.id !== 'klog-head-row') el.remove();
  });
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  while (tmp.firstChild) body.appendChild(tmp.firstChild);
}

function renderKlog(rows) {
  const body = document.getElementById('klog-body');
  // Remove only rows (not the sticky header)
  Array.from(body.children).forEach(el => { if (el.id !== 'klog-head-row') el.remove(); });
  if (!rows || !rows.length) {
    const e = document.createElement('div'); e.className = 'klog-empty'; e.textContent = 'No keystrokes';
    body.appendChild(e); return;
  }
  const frag = document.createDocumentFragment();
  rows.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'klog-row'; div.id = 'krow-' + i;
    div.innerHTML =
      '<span class="klog-ts">' + escHtml(formatTs(row.ts)) + '</span>' +
      '<span class="klog-key">' + escHtml(row.key || String(row.vk || '')) + '</span>' +
      '<span class="klog-win" title="' + escHtml(row.window || '') + '">' + escHtml(row.window || '') + '</span>';
    frag.appendChild(div);
  });
  body.appendChild(frag);
}

// ── Video ↔ Keylog sync ──
document.getElementById('klog-sync-toggle').addEventListener('click', function() {
  klogSync = !klogSync;
  this.classList.toggle('on', klogSync);
  this.textContent = klogSync ? 'Sync' : 'Free';
  if (!klogSync && syncTimer) { clearInterval(syncTimer); syncTimer = null; }
  if (klogSync) startSyncLoop();
});

function startSyncLoop() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(syncKlogToVideo, 500);
}

function syncKlogToVideo() {
  if (!klogSync || !klogData.length || !currentSegFile) return;
  const vid = document.getElementById('vid');
  if (vid.paused && vid.currentTime === 0) return;
  // Use server-computed epochMs (tz-correct) if available, fallback to JST parse
  let segEpoch = currentSegFile.epochMs;
  if (!segEpoch) {
    const m = currentSegFile.filename.match(/_(\d{2})(\d{2})(\d{2})\.mp4$/i);
    if (!m) return;
    segEpoch = new Date(currentSegFile.date + 'T' + m[1] + ':' + m[2] + ':' + m[3] + '+09:00').getTime();
  }
  const videoWallMs = segEpoch + vid.currentTime * 1000;
  let bestIdx = 0, bestDiff = Infinity;
  klogData.forEach((row, i) => {
    const rowMs = typeof row.ts === 'string'
      ? new Date(row.ts).getTime()
      : typeof row.ts === 'number'
        ? (row.ts > 9999999999 ? row.ts : row.ts * 1000)
        : NaN;
    if (isNaN(rowMs)) return; // Fix: skip NaN to avoid bestIdx stuck at 0
    const diff = Math.abs(rowMs - videoWallMs);
    if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
  });
  document.querySelectorAll('.klog-row').forEach(el => el.classList.remove('highlight'));
  const target = document.getElementById('krow-' + bestIdx);
  if (target && bestDiff < 60000) {
    target.classList.add('highlight');
    target.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

startSyncLoop();
refreshStatus();
setInterval(refreshStatus, 5000);
loadSessions();
// R-CLOCK-1: live current-time clock in header
(function tickClock() {
  document.getElementById('clock-now').textContent = new Date().toLocaleTimeString('ja-JP');
  setTimeout(tickClock, 1000);
})();
</script>
</body>
</html>
